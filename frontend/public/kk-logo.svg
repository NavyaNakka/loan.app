<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ring1" x1="28" y1="42" x2="84" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="ring2" x1="76" y1="42" x2="132" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="6" y="6" width="148" height="148" rx="36" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="12" y="12" width="136" height="136" rx="30" stroke="white" stroke-opacity="0.09" stroke-width="1.5"/>

  <!-- Soft glow behind rings -->
  <circle cx="62" cy="77" r="29" stroke="#2563EB" stroke-width="16" fill="none" opacity="0.35"/>
  <circle cx="98" cy="77" r="29" stroke="#1D4ED8" stroke-width="16" fill="none" opacity="0.35"/>

  <!-- Two interlocked rings — "Konnect" symbol -->
  <circle cx="62" cy="77" r="27" stroke="url(#ring1)" stroke-width="9" fill="none"/>
  <circle cx="98" cy="77" r="27" stroke="url(#ring2)" stroke-width="9" fill="none"/>

  <!-- Loan / document lines inside left ring (credit) -->
  <line x1="50" y1="70" x2="70" y2="70" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.88"/>
  <line x1="50" y1="78" x2="70" y2="78" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.88"/>
  <line x1="50" y1="86" x2="63" y2="86" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.88"/>

  <!-- Upward trending chart inside right ring (lending/growth) -->
  <polyline points="87,92 93,82 100,87 110,69" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.92"/>
  <!-- Arrow tip at top of chart -->
  <path d="M104,67 L110,69 L108,76" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.92"/>

  <!-- Bottom network nodes (connection) -->
  <circle cx="46" cy="119" r="5.5" fill="#60A5FA" opacity="0.95"/>
  <circle cx="80" cy="124" r="7"   fill="#7DD3FC"/>
  <circle cx="114" cy="119" r="5.5" fill="#38BDF8" opacity="0.95"/>
  <line x1="52"  y1="119" x2="74"  y2="123" stroke="#93C5FD" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="86"  y1="123" x2="108" y2="119" stroke="#93C5FD" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
</svg>