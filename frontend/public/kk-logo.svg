<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1445"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="35" y1="24" x2="125" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- Dark navy rounded-square background -->
  <rect x="4" y="4" width="152" height="152" rx="38" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="140" height="140" rx="33" stroke="white" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- Large gold coin — dominant element -->
  <circle cx="80" cy="80" r="57" fill="url(#coinGrad)"/>
  <!-- Coin depth ring -->
  <circle cx="80" cy="80" r="50" stroke="#92400E" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- ₹ Rupee symbol in dark navy — bold, stroke-based, properly constructed -->
  <!-- Left vertical bar (full height) -->
  <line x1="59" y1="44" x2="59" y2="116" stroke="#1E3A8A" stroke-width="9.5" stroke-linecap="round"/>
  <!-- Top horizontal bar -->
  <line x1="51" y1="44" x2="99" y2="44" stroke="#1E3A8A" stroke-width="9.5" stroke-linecap="round"/>
  <!-- Mid horizontal bar -->
  <line x1="51" y1="68" x2="99" y2="68" stroke="#1E3A8A" stroke-width="9.5" stroke-linecap="round"/>
  <!-- Right arch — D-shape bowl (cubic bezier bulging right) -->
  <path d="M 99,44 C 124,44 124,68 99,68" stroke="#1E3A8A" stroke-width="9.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diagonal slash from mid-bar down to bottom-right -->
  <line x1="76" y1="72" x2="106" y2="116" stroke="#1E3A8A" stroke-width="9.5" stroke-linecap="round"/>
</svg>