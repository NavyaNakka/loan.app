<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="40" y1="30" x2="100" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect x="4" y="4" width="152" height="152" rx="38" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="140" height="140" rx="33" stroke="white" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- Gold coin (finance / credit) -->
  <circle cx="65" cy="74" r="36" fill="url(#coinGrad)" opacity="0.95"/>
  <circle cx="65" cy="74" r="28" stroke="#FFF8E1" stroke-width="2" fill="none" opacity="0.45"/>

  <!-- Rupee ₹ inside coin — clean construction -->
  <!-- Vertical stem -->
  <line x1="60" y1="57" x2="60" y2="93" stroke="#78350F" stroke-width="5" stroke-linecap="round"/>
  <!-- Top crossbar -->
  <line x1="53" y1="57" x2="77" y2="57" stroke="#78350F" stroke-width="5" stroke-linecap="round"/>
  <!-- Second crossbar (mid) -->
  <line x1="53" y1="67" x2="77" y2="67" stroke="#78350F" stroke-width="5" stroke-linecap="round"/>
  <!-- Arch on top half of stem (the loop of ₹) -->
  <path d="M60 57 Q79 57 79 67 Q79 77 60 77" stroke="#78350F" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diagonal line to bottom-right -->
  <line x1="59" y1="68" x2="78" y2="93" stroke="#78350F" stroke-width="5" stroke-linecap="round"/>

  <!-- Bar chart — growth/lending (right side) -->
  <rect x="97"  y="107" width="9" height="16" rx="3" fill="#38BDF8" opacity="0.88"/>
  <rect x="110" y="91"  width="9" height="32" rx="3" fill="#60A5FA" opacity="0.88"/>
  <rect x="123" y="73"  width="9" height="50" rx="3" fill="#818CF8" opacity="0.88"/>

  <!-- Trend line over bars -->
  <polyline points="101,103 114,87 127,69" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <!-- Arrow tip -->
  <polyline points="121,65 127,69 123,76" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- Dashed arc connecting coin to bars (Konnect bridge) -->
  <path d="M99 68 Q84 46 68 58" stroke="#93C5FD" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.65"/>
</svg>